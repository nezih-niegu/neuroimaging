services:
  neuroimaging:
    build: .
    image: neuroimaging-shiny
    container_name: neuroimaging-shiny
    # The rocker/r-ver base is multi-arch, so this builds natively on both
    # Intel and Apple Silicon. If you ever need to force x86_64 emulation
    # (e.g. a dependency without an arm64 build), uncomment the next line:
    # platform: linux/amd64
    ports:
      - "3838:3838"   # Shiny frontend
      - "8000:8000"   # plumber REST API
    volumes:
      # Persist the patient database (and cached models) across restarts.
      - neuroimaging_data:/app/data
    environment:
      NEUROIMAGING_API_PORT: "8000"
      NEUROIMAGING_APP_PORT: "3838"
      NEUROIMAGING_API_URL: "http://127.0.0.1:8000"
    restart: unless-stopped

volumes:
  neuroimaging_data:
